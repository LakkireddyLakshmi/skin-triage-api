<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Triage</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🩺 Skin Triage</h1>
    <p class="tagline">Upload a skin photo for an AI triage estimate — and keep a private history of your scans.</p>
  </header>

  <main>
    <!-- Logged-out view: sign up / log in -->
    <section id="auth-view" class="card">
      <div class="tabs">
        <button id="tab-login" class="tab active">Log in</button>
        <button id="tab-register" class="tab">Sign up</button>
      </div>
      <form id="auth-form">
        <label>Email<input type="email" id="email" required autocomplete="email" /></label>
        <label>Password<input type="password" id="password" required minlength="8" autocomplete="current-password" placeholder="at least 8 characters" /></label>
        <button type="submit" id="auth-submit">Log in</button>
      </form>
      <p id="auth-msg" class="msg"></p>
    </section>

    <!-- Logged-in view: upload + history -->
    <section id="app-view" class="hidden">
      <div class="topbar">
        <span id="who"></span>
        <button id="logout" class="link">Log out</button>
      </div>

      <div class="card">
        <h2>New scan</h2>
        <form id="scan-form">
          <input type="file" id="file" accept="image/*" required />
          <button type="submit" id="scan-submit">Analyze</button>
        </form>
        <p id="scan-msg" class="msg"></p>
        <div id="result" class="result hidden">
          <span class="result-label" id="result-label"></span>
          <span class="result-conf" id="result-conf"></span>
        </div>
      </div>

      <div class="card">
        <h2>Your scan history</h2>
        <ul id="history" class="history"></ul>
      </div>
    </section>
  </main>

  <footer>
    <p>⚠️ Educational demo only — not a medical diagnosis. Always consult a dermatologist.</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
